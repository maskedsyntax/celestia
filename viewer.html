<!DOCTYPE html>
<html>
<head>
    <title>Celestia N-Body Viewer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h1>Celestia</h1>
        <div id="status">Loading data...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="data.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let frames = [];
        let currentFrame = 0;
        let scale = 2.0;

        function init() {
            if (typeof simulationData === 'undefined') {
                status.innerText = "Error: data.js not found or empty.";
                return;
            }
            frames = Object.keys(simulationData).sort((a, b) => parseFloat(a) - parseFloat(b));
            status.innerText = `Loaded ${frames.length} frames. Press space to play/pause.`;
            
            window.addEventListener('resize', resize);
            resize();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        let playing = true;
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') playing = !playing;
        });

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const time = frames[currentFrame];
            const points = simulationData[time];

            ctx.fillStyle = 'white';
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            points.forEach(p => {
                const x = cx + p[0] * scale;
                const y = cy + p[1] * scale;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            status.innerText = `Time: ${time} | Frame: ${currentFrame}/${frames.length}`;

            if (playing) {
                currentFrame = (currentFrame + 1) % frames.length;
            }
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
