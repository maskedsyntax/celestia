<!DOCTYPE html>
<html>
<head>
    <title>Celestia N-Body Viewer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h1>CELESTIA</h1>
        <div id="status">Loading...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="data.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let frames = [];
        let currentFrame = 0;
        let playing = true;
        let scale = 3.5; // Fixed scale

        function init() {
            if (typeof simulationData === 'undefined') {
                status.innerText = "Error: data.js not found.";
                return;
            }
            frames = Object.keys(simulationData).sort((a, b) => parseFloat(a) - parseFloat(b));
            window.addEventListener('resize', resize);
            window.addEventListener('keydown', e => { if (e.code === 'Space') playing = !playing; });
            resize();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            // Clean trail - No ghosting
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const time = frames[currentFrame];
            const points = simulationData[time];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.fillStyle = '#fff';
            points.forEach(p => {
                const x = cx + p[0] * scale;
                const y = cy + p[1] * scale;
                ctx.fillRect(x, y, 1.5, 1.5); // Sharp points
            });

            status.innerText = `T:${time} | N:${points.length}`;

            if (playing) {
                currentFrame = (currentFrame + 1) % frames.length;
            }
            requestAnimationFrame(animate);
        }
        init();
    </script>
</body>
</html>
